services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fxpricing}
      POSTGRES_USER: ${POSTGRES_USER:-fxuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fxpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fxuser} -d ${POSTGRES_DB:-fxpricing}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fx-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fx-network

volumes:
  postgres_data:

networks:
  fx-network:
    driver: bridge
